<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Risk Detection</title>
    <style>
        /* Reset some default browser styles */
        body, h1, p, select, input, button {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Set background with a subtle blur effect */
        body {
            background-image: url('bg.jpg'); /* Gunakan url() untuk menyisipkan gambar */
            background-size: cover; /* Menyesuaikan ukuran web */
            background-repeat: no-repeat; /* Gambar tidak akan berulang */
            background-position: center; /* Posisi gambar di tengah */
            background-attachment: fixed; /* Gambar tetap saat halaman di-scroll */
            color: #444;
            font-size: 16px;
        }
        /* Center container with a clean card layout */
        .container {
            max-width: 700px;
            margin: auto;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Heading and form styling */
        h1 {
            text-align: center;
            color: #0056b3;
            margin-bottom: 20px;
        }

        .logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 150px;
        }

        label {
            display: block;
            font-size: 1.1em;
            margin: 12px 0 5px;
            color: #333;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }

        select:focus, input:focus {
            border-color: #0056b3;
            outline: none;
        }

        /* Button Styles */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }

        button:hover {
            background-color: #003b8e;
        }

        /* Result section styling */
        .result {
            margin-top: 30px;
            padding: 20px;
            background-color: #f1f1f1;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .result b {
            color: #0056b3;
        }

        /* Responsive Design */
        @media screen and (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.6em;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <img src="diabetes.png" alt="Logo" class="logo">
        <h1>Diabetes Risk Detection</h1>
        <form id="riskForm">
            <label for="gender">Jenis Kelamin</label>
            <select id="gender" required>
                <option value="">Pilih...</option>
                <option value="laki">Laki-laki</option>
                <option value="perempuan">Perempuan</option>
            </select>

            <label for="weight">Berat Badan (kg)</label>
            <input type="number" id="weight" required>

            <label for="height">Tinggi (cm)</label>
            <input type="number" id="height" required>

            <div class="row">
                <div class="col-lg-4">
                    <div class="small-box bg-info">
                        <div class="inner">
                            <p>Hasil BMI:</p>
                            <h3><span id="bmi-result">0</span></h3>
                            <p>Kategori: <span id="bmi-category"></span></p>
                        </div>
                        <div class="icon">
                            <i class="fas fa-tint"></i>
                        </div>
                </div>
            </div>
            <br>

            <label for="age">Usia (tahun)</label>
            <input type="number" id="age" required>

            <label for="waist">Lingkar Pinggang</label>
            <select id="waist" required>
                <option value="">Pilih...</option>
                <option value="1">&lt;80cm</option>
                <option value="2">80-88cm</option>
                <option value="3">89-93cm</option>
                <option value="4">94-102cm</option>
                <option value="5">&gt;102cm</option>
            </select>

            <label for="familyHistory1">Apakah kakek, bibi, paman, atau sepupu pertama pernah didiagnosis Diabetes?</label>
            <select id="familyHistory1" required>
                <option value="">Pilih...</option>
                <option value="3">Ya</option>
                <option value="0">Tidak</option>
            </select>

            <label for="familyHistory2">Apakah orang tua, saudara kandung, atau anak kandung pernah didiagnosis Diabetes?</label>
            <select id="familyHistory2" required>
                <option value="">Pilih...</option>
                <option value="5">Ya</option>
                <option value="0">Tidak</option>
            </select>

            <label for="highSugar">Apakah kamu pernah memiliki kadar gula darah yang tinggi?</label>
            <select id="highSugar" required>
                <option value="">Pilih...</option>
                <option value="5">Ya</option>
                <option value="0">Tidak</option>
            </select>

            <label for="bloodPressure">Apakah kamu sehari-hari pernah mengkonsumsi obat darah tinggi?</label>
            <select id="bloodPressure" required>
                <option value="">Pilih...</option>
                <option value="2">Ya</option>
                <option value="0">Tidak</option>
            </select>

            <label for="exercise">Apakah kamu berolahraga selama lebih dari 30 menit setiap hari?</label>
            <select id="exercise" required>
                <option value="">Pilih...</option>
                <option value="0">Ya</option>
                <option value="2">Tidak</option>
            </select>

            <label for="fruitsVeggies">Seberapa sering kamu mengkonsumsi sayur dan buah?</label>
            <select id="fruitsVeggies" required>
                <option value="">Pilih...</option>
                <option value="0">Setiap Hari</option>
                <option value="1">Jarang</option>
            </select>

            <button type="button" onclick="calculateRisk()">Hitung Risiko</button>
            <button type="button" onclick="downloadPDF()">Download PDF</button>
            <button type="button" onclick="resetForm()">Ulangi</button>
        </form>
        <div id="result" class="result"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        var category = "";

        function getWaistSize(waist) {
            switch(waist) {
                case 1: return "<80cm";
                case 2: return "80-88cm";
                case 3: return "89-93cm";
                case 4: return "94-102cm";
                case 5: return ">102cm";
                default: return "Pilih...";
            }
        }

        function calculateRisk() {
            // Your existing calculation logic...
            // Update your calculation as needed
            const age = parseInt(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value) / 100;
            const gender = document.getElementById('gender').value;
            const waist = parseInt(document.getElementById('waist').value);
            const familyHistory1 = parseInt(document.getElementById('familyHistory1').value);
            const familyHistory2 = parseInt(document.getElementById('familyHistory2').value);
            const highSugar = parseInt(document.getElementById('highSugar').value);
            const bloodPressure = parseInt(document.getElementById('bloodPressure').value);
            const exercise = parseInt(document.getElementById('exercise').value);
            const fruitsVeggies = parseInt(document.getElementById('fruitsVeggies').value);

            // Calculate points
            let agePoint = 0;
            if (age >= 45 && age <= 54) agePoint = 2;
            else if (age >= 55 && age <= 64) agePoint = 3;
            else if (age > 64) agePoint = 4;

            const bmi = weight / (height * height);
            let bmiPoint = 0;
            if (bmi >= 25 && bmi < 30) bmiPoint = 1;
            else if (bmi >= 30) bmiPoint = 3;

            let waistPoint = waist;
            if (gender === 'perempuan') {
                if (waist === 2) waistPoint = 3;
                if (waist > 2) waistPoint = 4;
            }

            const totalScore = agePoint + bmiPoint + waistPoint + familyHistory1 + familyHistory2 + highSugar + bloodPressure + exercise + fruitsVeggies;

            let risk = "";
            if (totalScore < 7) risk = "1% (Sangat kecil)";
            else if (totalScore >= 7 && totalScore <= 11) risk = "4% (Kecil)";
            else if (totalScore >= 12 && totalScore <= 14) risk = "17% (Sedang)";
            else if (totalScore >= 15 && totalScore <= 20) risk = "33% (Tinggi)";
            else risk = "50% (Sangat Tinggi)";

            document.getElementById('result').innerHTML = `
                <b>Jenis Kelamin:</b> ${gender === 'laki' ? 'Laki-laki' : 'Perempuan'} <br>
                <b>Berat Badan:</b> ${weight} kg <br>
                <b>Tinggi:</b> ${height * 100} cm <br>
                <b>Bmi:</b> ${bmi.toFixed(2)} <b> Kategori: </b> ${category} <br>
                <b>Usia:</b> ${age} tahun <br>
                <b>Lingkar Pinggang:</b> ${getWaistSize(waist)} (Skor: ${waist}) <br>
                <b>Kakek/Bibi/Paman/Sepupu Diabetes:</b> ${familyHistory1 === 3 ? 'Ya' : 'Tidak'} (Skor: ${familyHistory1}) <br>
                <b>Orang Tua/Saudara Kandung/Anak Kandung Diabetes:</b> ${familyHistory2 === 5 ? 'Ya' : 'Tidak'} (Skor: ${familyHistory2}) <br>
                <b>Kadar Gula Darah Tinggi:</b> ${highSugar === 5 ? 'Ya' : 'Tidak'} (Skor: ${highSugar}) <br>
                <b>Obat Darah Tinggi:</b> ${bloodPressure === 2 ? 'Ya' : 'Tidak'} (Skor: ${bloodPressure}) <br>
                <b>Olahraga:</b> ${exercise === 0 ? 'Ya' : 'Tidak'} (Skor: ${exercise}) <br>
                <b>Sayur/Buah:</b> ${fruitsVeggies === 0 ? 'Setiap Hari' : 'Jarang'} (Skor: ${fruitsVeggies}) <br>
                <b>Total Skor:</b> ${totalScore} <br>
                <br>
                <div class="row">
                    <div class="col-lg-4">
                        <div class="small-box bg-info">
                            <div class="inner">
                                <p>Resiko Diabetes</p>
                                <h3>${risk}</h3>
                            </div>
                            <div class="icon">
                                <i class="fas fa-tint"></i>
                            </div>
                    </div>
                </div>
            `;
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const resultText = document.getElementById('result').innerText;
            doc.text(resultText, 10, 10);
            doc.save('diabetes-risk-result.pdf');
        }

        function resetForm() {
            document.getElementById('riskForm').reset();
            document.getElementById('result').innerHTML = '';
        }

        function calculateBMI() {
            // Your existing BMI calculation logic...
            // Ambil nilai berat badan dan tinggi badan
            var weight = parseFloat(document.getElementById("weight").value);
            var height = parseFloat(document.getElementById("height").value);

            // Periksa apakah input valid
            if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
                document.getElementById("bmi-result").textContent = "--";
                return;
            }

            // Konversi tinggi badan ke meter
            height = height / 100;

            // Hitung BMI
            var bmi = weight / (height * height);
            
            if (bmi < 17.0) {
                category = "Kurus, Kekurangan berat badan berat";
            } else if (bmi >= 17.0 && bmi <= 18.4) {
                category = "Kurus, Kekurangan berat badan ringan";
            } else if (bmi >= 18.5 && bmi <= 25.0) {
                category = "Normal";
            } else if (bmi >= 25.1 && bmi <= 27.0) {
                category = "Gemuk, Kelebihan berat badan tingkat ringan";
            } else if (bmi > 27) {
                category = "Gemuk, Kelebihan berat badan tingkat berat";
            }

            // Tampilkan hasil BMI
            document.getElementById("bmi-result").textContent = bmi.toFixed(2);
            document.getElementById("bmi-category").textContent = category;
        }

        document.getElementById("weight").addEventListener("input", calculateBMI);
        document.getElementById("height").addEventListener("input", calculateBMI);
    </script>
</body>
</html>
